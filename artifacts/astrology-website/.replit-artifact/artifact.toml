kind = "web"
previewPath = "/"
title = "Pandit Vikas Chand Tripathi Ji — Vedic Astrology"
version = "1.0.0"
id = "artifacts/astrology-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25061

[services.development]
run = "pnpm --filter @workspace/astrology-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/astrology-website", "run", "build" ]
publicDir = "artifacts/astrology-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25061"
BASE_PATH = "/"
